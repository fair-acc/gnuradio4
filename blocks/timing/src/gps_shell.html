<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GPS/GNSS Receiver — WASM + WebSerial</title>
    <style>
        body {
            font-family: monospace;
            margin: 1em;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        button {
            font-size: 1em;
            padding: 0.4em 1em;
            margin-right: 0.5em;
            cursor: pointer;
            background: #264f78;
            color: #d4d4d4;
            border: 1px solid #569cd6;
            border-radius: 3px;
        }

        button:hover {
            background: #37699e;
        }

        #status {
            color: #569cd6;
            margin-left: 1em;
        }

        #output {
            width: 100%;
            height: 85vh;
            background: #0e0e0e;
            color: #4ec9b0;
            padding: 0.5em;
            overflow-y: auto;
            white-space: pre;
            font-size: 0.85em;
            border: 1px solid #333;
            box-sizing: border-box;
            margin-top: 0.5em;
        }
    </style>
</head>
<body>
<div>
    <button onclick="Module._gr_requestAllPermissions(); Module._startGpsGraph();">Connect Devices</button>
    <button onclick="Module._stopGpsGraph()">Stop</button>
    <span id="status"></span>
</div>
<div id="output"></div>
<script>
    var Module = {
        print: function (text) {
            var el = document.getElementById('output');
            el.textContent += text + '\n';
            el.scrollTop = el.scrollHeight;
        },
        printErr: function (text) {
            var el = document.getElementById('output');
            el.textContent += text + '\n';
            el.scrollTop = el.scrollHeight;
        },
        onRuntimeInitialized: function () {
            document.getElementById('status').textContent = 'ready \u2014 click "Connect Devices"';
        }
    };
</script>
{{{ SCRIPT }}}
</body>
</html>
