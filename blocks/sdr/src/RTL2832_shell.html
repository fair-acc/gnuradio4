<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>RTL2832 Capture — WASM + WebUSB</title>
    <style>
        body {
            font-family: monospace;
            margin: 1em;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        button {
            font-size: 1em;
            padding: 0.4em 1em;
            margin-right: 0.5em;
            cursor: pointer;
            background: #264f78;
            color: #d4d4d4;
            border: 1px solid #569cd6;
            border-radius: 3px;
        }

        button:hover {
            background: #37699e;
        }

        #status {
            color: #569cd6;
            margin-left: 1em;
        }

        #output {
            width: 100%;
            height: 85vh;
            background: #0e0e0e;
            color: #4ec9b0;
            padding: 0.5em;
            overflow-y: auto;
            white-space: pre;
            font-size: 0.85em;
            border: 1px solid #333;
            box-sizing: border-box;
            margin-top: 0.5em;
        }
    </style>
</head>
<body>
<div>
    <button onclick="(async function(){
        try {
            await Module.ccall('gr_requestAllPermissions', null, [], [], {async: true});
            var ret = await Module.ccall('rtl2832Connect', 'number', [], [], {async: true});
            if (ret < 0) { Module.print('[RTL2832] failed to open device'); return; }
            Module._startRTL2832Capture();
        } catch(e) { Module.print('[RTL2832] error: ' + e.message); }
    })();">Connect RTL2832
    </button>
    <button onclick="Module._stopRTL2832Capture()">Stop</button>
    <span id="status"></span>
</div>
<div id="output"></div>
<script>
    var Module = {
        print: function (text) {
            var el = document.getElementById('output');
            el.textContent += text + '\n';
            el.scrollTop = el.scrollHeight;
        },
        printErr: function (text) {
            var el = document.getElementById('output');
            el.textContent += text + '\n';
            el.scrollTop = el.scrollHeight;
        },
        onRuntimeInitialized: function () {
            document.getElementById('status').textContent = 'ready — click "Connect RTL2832"';
        }
    };
</script>
{{{ SCRIPT }}}
</body>
</html>
